name: Deploy Governor

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches:
      - main
    paths:
      - 'governor/**'
      - 'scripts/governor.service'

jobs:
  deploy:
    runs-on: self-hosted  # Requires self-hosted runner on the server
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build governor
        run: |
          cd governor
          go build -o governor ./cmd/governor
      
      - name: Deploy service
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          VAULT_KEY: ${{ secrets.VAULT_KEY }}
        run: |
          # Create systemd override with secrets
          sudo mkdir -p /etc/systemd/system/vibepilot-governor.service.d
          sudo tee /etc/systemd/system/vibepilot-governor.service.d/override.conf > /dev/null << EOF
          [Service]
          Environment="SUPABASE_URL=$SUPABASE_URL"
          Environment="SUPABASE_KEY=$SUPABASE_KEY"
          Environment="VAULT_KEY=$VAULT_KEY"
          EOF
          sudo chmod 600 /etc/systemd/system/vibepilot-governor.service.d/override.conf
          
          # Install and restart service
          sudo cp scripts/governor.service /etc/systemd/system/
          sudo systemctl daemon-reload
          sudo systemctl enable vibepilot-governor
          sudo systemctl restart vibepilot-governor
      
      - name: Check status
        run: |
          sleep 2
          systemctl status vibepilot-governor --no-pager
