name: Courier Task

on:
  repository_dispatch:
    types: [courier_task]

jobs:
  execute:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.branch_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install browser-use playwright requests
          playwright install chromium
      
      - name: Execute courier task
        env:
          TASK_ID: ${{ github.event.client_payload.task_id }}
          PROMPT: ${{ github.event.client_payload.prompt }}
          CALLBACK_URL: ${{ github.event.client_payload.callback_url }}
          SLICE_ID: ${{ github.event.client_payload.slice_id }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "Executing task: $TASK_ID"
          echo "Slice: $SLICE_ID"
          
          python -c "
          import requests
          import json
          import os
          
          task_id = os.environ.get('TASK_ID', '')
          prompt = os.environ.get('PROMPT', '')
          callback_url = os.environ.get('CALLBACK_URL', '')
          
          try:
              from browser_use import Agent
              from langchain_google_genai import ChatGoogleGenerativeAI
              
              llm = ChatGoogleGenerativeAI(model='gemini-2.0-flash')
              agent = Agent(task=prompt, llm=llm)
              result = agent.run()
              
              output = str(result)
              status = 'success'
              tokens_in = 0
              tokens_out = len(output) // 4
              
          except Exception as e:
              output = str(e)
              status = 'failed'
              tokens_in = 0
              tokens_out = 0
          
          payload = {
              'task_id': task_id,
              'status': status,
              'output': output[:10000],
              'tokens_in': tokens_in,
              'tokens_out': tokens_out,
          }
          
          if callback_url:
              requests.post(callback_url, json=payload)
          
          print(f'Task {task_id}: {status}')
          "
      
      - name: Report failure
        if: failure()
        env:
          TASK_ID: ${{ github.event.client_payload.task_id }}
          CALLBACK_URL: ${{ github.event.client_payload.callback_url }}
        run: |
          python -c "
          import requests
          import os
          
          payload = {
              'task_id': os.environ.get('TASK_ID', ''),
              'status': 'failed',
              'output': 'GitHub Actions workflow failed',
              'error': 'Workflow execution error',
              'tokens_in': 0,
              'tokens_out': 0,
          }
          
          callback_url = os.environ.get('CALLBACK_URL', '')
          if callback_url:
              requests.post(callback_url, json=payload)
          "
