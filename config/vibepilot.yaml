# VibePilot Configuration
# Edit this file to modify: roles, models, prompts, tools
# Changes take effect immediately (no code changes needed)

# =============================================================================
# MODELS (Add/remove/swap models here)
# Last updated: 2026-02-15
# =============================================================================

models:
  # ============================================================================
  # PRIMARY IN-HOUSE (VibePilot Governance - NEVER route to web platforms)
  # ============================================================================
  
  glm-5:
    platform: opencode
    type: runner
    role: primary_governance
    context_limit: 128000
    context_effective: 100000  # Real-world usable
    cost_per_1k_tokens: 0  # Subscription
    subscription_cost_monthly: 0  # Already paying
    status: active
    strengths: [reasoning, planning, review, governance]
    weaknesses: []
    notes: "Primary model for Consultant, Planner, Council, Supervisor"
    
  kimi-k2.5:
    platform: kimi-cli
    type: runner
    role: parallel_executor
    context_limit: 128000
    context_effective: 100000
    cost_per_1k_tokens: 0  # Subscription
    subscription_cost_monthly: 10  # Approximate
    subscription_renews: monthly
    status: active
    strengths: [long_context, code_generation, web_browsing, agent_swarm]
    weaknesses: [english_reasoning]
    cli_path: ~/.local/bin/kimi
    notes: "Parallel task execution, swarm mode for wide tasks"

  # ============================================================================
  # API RUNNERS (Pay-per-use or free tier)
  # ============================================================================
  
  deepseek-chat:
    platform: deepseek-api
    type: runner
    role: backup_executor
    context_limit: 128000
    context_effective: 100000
    cost_per_1k_input: 0.00028  # $0.28/1M cache miss
    cost_per_1k_input_cached: 0.000028  # $0.028/1M cache hit
    cost_per_1k_output: 0.00042  # $0.42/1M
    credit_available: 2.00  # User has $2
    credit_used: 0
    rate_limit: none  # They serve all requests
    status: active
    strengths: [coding, chinese_language, low_latency]
    weaknesses: [less_mature_than_gpt]
    notes: "Use for code tasks, cache when possible"
    
  gemini-2.0-flash:
    platform: google-ai
    type: runner
    role: researcher
    context_limit: 128000
    context_effective: 100000
    cost_per_1k_tokens: 0  # Free tier
    free_tier_limits:
      requests_per_minute: 15
      requests_per_day: 1500
      tokens_per_day: 1000000
    status: active
    strengths: [research, multimodal, fast]
    weaknesses: [rate_limits]
    notes: "Free tier, good for System Research agent"

  # ============================================================================
  # LAST RESORT ONLY (Dangerous - use with extreme caution)
  # ============================================================================
  
  openrouter:
    platform: openrouter
    type: gateway
    role: last_resort_only
    status: paused
    status_reason: "Free models often unavailable, routes to paid without warning"
    credit_available: 16.00
    credit_used: 5.00  # Already burned $5 on failed "free" model
    hard_spending_limit: 16.00  # NEVER exceed this
    warning: |
      ⚠️  DANGER: "Free" models shown may not be available.
          When unavailable, OpenRouter routes to PAID models without warning.
          Example: Charged $5 for a model that just asked for more info.
          
          RULES:
          1. Never auto-route to OpenRouter
          2. Only use when human explicitly approves
          3. Always verify model availability before dispatch
          4. Never exceed hard_spending_limit
    notes: "Gateway to many models, but unreliable pricing. Use direct APIs instead."

  # ============================================================================
  # EMERGING PLATFORMS (Monitor, not yet in rotation)
  # ============================================================================
  
  huggingface:
    platform: huggingface
    type: inference
    role: monitor_only
    status: paused
    status_reason: "Research only - not yet integrated"
    notes: |
      Free models, often new releases/betas from major providers.
      Good for testing new models before adding to registry.
      Check: huggingface.co/models for free inference models.
    potential_models:
      - name: "Various free tier models"
        notes: "New releases often free during beta"
        access: "Inference API or download for local"

  # ============================================================================
  # PAUSED/DISABLED
  # ============================================================================
  
  # Add paused models here with status: paused and status_reason

# =============================================================================
# ROLES (What hats can agents wear)
# =============================================================================

roles:
  supervisor:
    description: "Reviews task outputs for quality"
    skills: [review, validate, approve]
    max_skills: 3
    default_model: glm-5
    alternative_models: [kimi-k2.5]
    
  coder:
    description: "Writes clean, production-ready code"
    skills: [generate, modify, refactor]
    max_skills: 3
    default_model: glm-5
    alternative_models: [kimi-k2.5]
    
  researcher:
    description: "Researches and summarizes"
    skills: [research, summarize, compare]
    max_skills: 3
    default_model: gemini-flash
    alternative_models: []
    
  council_member:
    description: "Independently reviews decisions"
    skills: [review, analyze, vote]
    max_skills: 3
    default_model: null  # Requires 3 different models
    requires_multiple_models: true
    
  executor:
    description: "Executes tasks efficiently"
    skills: [execute, implement, deliver]
    max_skills: 3
    default_model: kimi-k2.5
    alternative_models: [glm-5]
    
  planner:
    description: "Breaks work into atomic tasks"
    skills: [decompose, sequence, estimate]
    max_skills: 3
    default_model: glm-5
    alternative_models: []
    
  consultant:
    description: "Turns ideas into PRDs"
    skills: [analyze, document, specify]
    max_skills: 3
    default_model: glm-5
    alternative_models: []

# =============================================================================
# PROMPTS (Role-specific prompts - editable from dashboard)
# =============================================================================

prompts:
  supervisor: |
    You are the Supervisor. Review task outputs.
    
    CHECK:
    1. Does this match the plan?
    2. Any issues or conflicts?
    3. Production-ready?
    
    Return JSON: {"passed": bool, "confidence": float, "issues": [], "notes": str}
    
  coder: |
    You are the Coder. Write clean code.
    
    RULES:
    - No comments unless complex
    - Proper error handling
    - Clear variable names
    - No hardcoded secrets
    
    Return: Only the code.
    
  researcher: |
    You are the Researcher. Gather and summarize.
    
    RULES:
    - No opinions, just facts
    - Include pros/cons
    - Stay under 200 words
    - Note confidence level
    
    Return JSON: {"summary": str, "pros": [], "cons": [], "confidence": float}
    
  council_member: |
    You are a Council Member. Review independently.
    
    RULES:
    - Do NOT chat with other members
    - Review independently
    - Consider: architecture, security, feasibility, PRD alignment
    
    Return JSON: {"vote": "APPROVED|REVISION_NEEDED|BLOCKED", "confidence": float, "concerns": [], "reasoning": str}
    
  executor: |
    You are the Executor. Get tasks done.
    
    RULES:
    - Follow specs exactly
    - No commentary
    - Return only requested output
    
  planner: |
    You are the Planner. Break work into atomic tasks.
    
    RULES:
    - Each task independently testable
    - Vertical slicing (complete feature per task)
    - Confidence >= 0.95 (split if lower)
    - Define acceptance criteria
    
  consultant: |
    You are the Consultant. Create PRDs.
    
    INCLUDE:
    - Overview
    - Objectives
    - Technical Stack
    - Features (P0/P1/P2)
    - Architecture
    - Security Requirements
    - Success Metrics

# =============================================================================
# TOOLS (Available tools per role)
# =============================================================================

tools:
  file_read:
    description: "Read file contents"
    available_to: [coder, supervisor, executor]
    
  file_write:
    description: "Write/create files"
    available_to: [coder, executor]
    
  web_search:
    description: "Search the web"
    available_to: [researcher]
    
  code_execute:
    description: "Run code"
    available_to: [executor, coder]
    
  git_operations:
    description: "Git commit/push/branch"
    available_to: [executor]
    
  supabase_query:
    description: "Query Supabase"
    available_to: [supervisor, planner]

# =============================================================================
# THRESHOLDS (System limits)
# =============================================================================

thresholds:
  max_task_attempts: 3
  timeout_minutes: 30
  
  # Context window management
  context_warn_pct: 70      # Warn at 70% context usage
  context_stop_pct: 80      # Stop assignments at 80%, start fresh session
  
  # Token management  
  token_warning_pct: 70
  token_max_pct: 80
  daily_gemini_limit: 30

# =============================================================================
# ORCHESTRATOR (Parallel execution settings)
# =============================================================================

orchestrator:
  # Max concurrent tasks. null = dynamic (matches available runners)
  # Set to specific number to cap: e.g., max_workers: 10
  max_workers: null
  
  # How often to check for new tasks (seconds)
  tick_interval: 2
  
  # Automatically scale thread pool when runners change
  dynamic_scaling: true
  
  # Minimum workers even if no runners available (for testing)
  min_workers: 1
  
  # Maximum workers cap (safety limit, even with many runners)
  max_workers_cap: 50
  
  # Enable ROI tracking
  track_roi: true
  
  # Enable telemetry
  telemetry_enabled: true
  
  # Kimi swarm settings
  swarm:
    enabled: true
    max_workers: 100          # Kimi's limit
    default_workers: 10       # Sensible default
    task_types:               # Auto-trigger swarm for these
      - repo_audit
      - bulk_refactor
      - parallel_test
      - wide_search

# =============================================================================
# WATCHER THRESHOLDS (Guardian settings)
# =============================================================================

watcher:
  # Real-time file guard
  file_guard_enabled: true
  revert_unauthorized_changes: true
  
  # Context monitoring
  context_check: post_task  # When to check: post_task | continuous
  context_warn_pct: 70
  context_stop_pct: 80
  
  # Loop/stuck detection (runs every 30s)
  check_interval_seconds: 30
  error_repeat_limit: 3     # Same error N times triggers action
  stuck_minutes: 10         # No progress threshold
  timeout_minutes: 30       # Max task duration
  retry_limit: 3            # Max attempts before escalation
  repetitive_pct: 50        # Token waste threshold

# =============================================================================
# SUPERVISOR QUALITY GATES
# =============================================================================

supervisor:
  quality_gates:
    check_secrets: true           # No hardcoded API keys, passwords
    check_error_handling: true    # Try/catch or equivalent present
    check_patterns: true          # Follows specified patterns
    check_test_coverage: true     # Tests written for new code
    check_documentation: false    # Only if required in task
  
  # Council consensus settings
  max_council_rounds: 6           # Max rounds before forced decision
  escalate_to_human_only_for:
    - business_scope_conflict
    - visual_ux_decision
    - ethical_legal_concern

# =============================================================================
# ESCALATION RULES
# =============================================================================

escalation:
  on_max_attempts:
    action: escalate_to_supervisor
    notify_human: false  # Only for UI/UX
  
  on_council_round_6_no_consensus:
    action: supervisor_decides
    notify_human: false  # Document and proceed
  
  on_council_blocked:
    action: require_human_review
    notify_human: true
    reasons:
      - business_scope_conflict
      - ethical_legal_concern
  
  on_budget_exceeded:
    action: pause_non_critical
    notify_human: true
